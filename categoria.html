<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria | Needway Nutrition</title>
    <script>
        // Redirect to loja.html with category parameter
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        window.location.replace(cat ? 'loja.html?cat=' + cat : 'loja.html');
    </script>
</head>

<body>  <script src="js/theme.js"></script>
</body>

</html>
