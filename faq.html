<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perguntas Frequentes | Needway Nutrition</title>
    <link rel="icon" type="image/png" href="icone sem fundo.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="topbar">
        <div class="topbar__track"><span class="topbar__item"><span class="icon"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></span> <strong>Frete Grátis</strong>
                acima de R$250</span></div>
    </div>
    <header class="header" id="header">
        <div class="header__inner"><a href="index.html" class="header__logo"><img src="IMG_0425.PNG"
                    alt="Needway Nutrition"></a>
            <div class="header__actions"><a href="login.html" class="header__action"><span
                        class="header__action-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span></a></div>
        </div>
    </header>
    <nav class="nav">
        <div class="nav__inner"><a href="loja.html" class="nav__link">Categorias</a><a href="outlet.html"
                class="nav__link" style="color:var(--accent-gold);">Outlet</a></div>
    </nav>

    <main class="page-content">
        <div class="container container--sm" style="padding-top:var(--space-2xl);">
            <div class="breadcrumb"><a href="index.html">Início</a><span class="breadcrumb__separator">›</span><span
                    class="breadcrumb__current">FAQ</span></div>
            <h1 class="heading heading--2" style="text-align:center;margin-bottom:var(--space-2xl);">Perguntas <span
                    class="highlight">Frequentes</span></h1>
            <div class="accordion" id="faqAccordion"></div>
            <div style="text-align:center;margin-top:var(--space-2xl);">
                <p class="text-muted">Não encontrou sua resposta?</p><a href="fale-conosco.html"
                    class="btn btn--primary" style="margin-top:var(--space-md);">Fale Conosco</a>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer__bottom">
            <div class="footer__bottom-inner"><span class="footer__copyright">© 2026 Needway Nutrition.</span></div>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
  <script src="js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('faqAccordion').innerHTML = NeedwayData.faq.map((item, i) => `
        <div class="accordion__item ${i === 0 ? 'active' : ''}">
          <button class="accordion__header"><span>${item.q}</span><span class="accordion__icon">+</span></button>
          <div class="accordion__body"><div class="accordion__content">${item.a}</div></div>
        </div>`).join('');
            initAccordion('#faqAccordion');
        });
    </script>
</body>

</html>
