<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar | Needway Nutrition</title>
    <link rel="icon" type="image/png" href="icone sem fundo.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="topbar">
        <div class="topbar__track"><span class="topbar__item"><span class="icon"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></span> <strong>Frete Grátis</strong>
                acima de R$250</span><span class="topbar__item"><span class="icon"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span> <strong>PIX com 10%
                    OFF</strong></span></div>
    </div>
    <header class="header" id="header">
        <div class="header__inner">
            <button class="menu-toggle mobile-only" aria-label="Menu"><span></span><span></span><span></span></button>
            <a href="index.html" class="header__logo"><img src="nome sem fundo.png" alt="Needway Nutrition"></a>
            <div class="header__search">
                <input type="text" class="header__search-input" id="searchInput" placeholder="Buscar suplementos..."
                    autocomplete="off">
                <button class="header__search-btn" onclick="performSearch()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
                <div class="search-dropdown" id="searchDropdown"></div>
            </div>
            <div class="header__actions"><a href="login.html" class="header__action"><span
                        class="header__action-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span></a><button class="header__action"
                    onclick="Cart.toggleMiniCart()"><span class="header__action-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span><span
                        class="header__action-badge cart-count" style="display:none;">0</span></button></div>
        </div>
    </header>
    <nav class="nav">
        <div class="nav__inner"><a href="loja.html" class="nav__link">Categorias</a><a href="outlet.html"
                class="nav__link" style="color:var(--accent-gold);">🔥 Outlet</a></div>
    </nav>

    <main class="page-content">
        <div class="container" style="padding-top:var(--space-2xl);">
            <h1 class="heading heading--2" id="searchHeading" style="margin-bottom:var(--space-xl);">Resultados para:
                <span class="highlight" id="searchQuery">...</span></h1>
            <p class="text-muted" id="searchCount" style="margin-bottom:var(--space-xl);"></p>
            <div class="grid grid--products" id="searchResults"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__bottom">
            <div class="footer__bottom-inner"><span class="footer__copyright">© 2026 Needway Nutrition.</span></div>
        </div>
    </footer>
    <aside class="minicart" id="minicart">
        <div class="minicart__header">
            <h3 class="minicart__title">🛒 Carrinho</h3><button onclick="Cart.toggleMiniCart()"
                style="color:var(--text-muted);font-size:var(--fs-xl);">✕</button>
        </div>
        <div class="minicart__items" id="minicartItems"></div>
        <div class="minicart__footer">
            <div class="minicart__total"><span>Total:</span><span class="minicart__total-value" id="minicartTotal">R$
                    0,00</span></div><a href="carrinho.html" class="btn btn--primary btn--full">Ver Carrinho</a>
        </div>
    </aside>
    <div class="overlay" id="overlay"></div>
    <a href="https://wa.me/5511970799084" target="_blank" class="whatsapp-float" aria-label="WhatsApp"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
  <script src="js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q') || '';
            document.getElementById('searchQuery').textContent = q;
            document.getElementById('searchInput').value = q;
            document.title = `Buscar: ${q} | Needway Nutrition`;

            if (q) {
                const results = searchProducts(q);
                const grid = document.getElementById('searchResults');
                document.getElementById('searchCount').textContent = `${results.length} produto${results.length !== 1 ? 's' : ''} encontrado${results.length !== 1 ? 's' : ''}`;
                grid.innerHTML = results.length > 0
                    ? results.map(renderProductCard).join('')
                    : '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state__icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div><h3 class="empty-state__title">Nenhum resultado encontrado</h3><p class="empty-state__text">Tente outro termo ou explore nossas categorias.</p><a href="loja.html" class="btn btn--primary">Ver Todos</a></div>';
            }
            initSearch();
        });

        function performSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (q) window.location.href = 'busca.html?q=' + encodeURIComponent(q);
        }
    </script>
</body>

</html>
