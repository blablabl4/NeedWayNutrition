<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos | Needway Nutrition</title>
    <link rel="icon" type="image/png" href="IMG_0425.PNG">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="topbar">
        <div class="topbar__track"><span class="topbar__item"><span class="icon">🚚</span> <strong>Frete Grátis</strong>
                acima de R$250</span><span class="topbar__item"><span class="icon">💰</span> <strong>PIX com 10%
                    OFF</strong></span></div>
    </div>
    <header class="header" id="header">
        <div class="header__inner">
            <button class="menu-toggle mobile-only" aria-label="Menu"><span></span><span></span><span></span></button>
            <a href="index.html" class="header__logo"><img src="IMG_0425.PNG" alt="Needway Nutrition"></a>
            <div class="header__search desktop-only"><input type="text" class="header__search-input" id="searchInput"
                    placeholder="Buscar..." autocomplete="off"><button class="header__search-btn">🔍</button>
                <div class="search-dropdown" id="searchDropdown"></div>
            </div>
            <div class="header__actions"><a href="login.html" class="header__action"><span
                        class="header__action-icon">👤</span></a><button class="header__action"
                    onclick="Cart.toggleMiniCart()"><span class="header__action-icon">🛒</span><span
                        class="header__action-badge cart-count" style="display:none;">0</span></button></div>
        </div>
    </header>
    <nav class="nav">
        <div class="nav__inner"><a href="loja.html" class="nav__link">Categorias</a><a href="outlet.html"
                class="nav__link" style="color:var(--accent-gold);">🔥 Outlet</a></div>
    </nav>

    <main class="page-content">
        <div class="container" style="padding-top:var(--space-2xl);">
            <div class="breadcrumb"><a href="index.html">Início</a><span class="breadcrumb__separator">›</span><span
                    class="breadcrumb__current">Favoritos</span></div>
            <h1 class="heading heading--2" style="margin-bottom:var(--space-xl);">Meus <span
                    class="highlight">Favoritos</span> <span class="text-muted text-sm" id="favCount"></span></h1>
            <div class="grid grid--products" id="favGrid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__bottom">
            <div class="footer__bottom-inner"><span class="footer__copyright">© 2026 Needway Nutrition.</span></div>
        </div>
    </footer>
    <aside class="minicart" id="minicart">
        <div class="minicart__header">
            <h3 class="minicart__title">🛒 Carrinho</h3><button onclick="Cart.toggleMiniCart()"
                style="color:var(--text-muted);font-size:var(--fs-xl);">✕</button>
        </div>
        <div class="minicart__items" id="minicartItems"></div>
        <div class="minicart__footer">
            <div class="minicart__total"><span>Total:</span><span class="minicart__total-value" id="minicartTotal">R$
                    0,00</span></div><a href="carrinho.html" class="btn btn--primary btn--full">Ver Carrinho</a>
        </div>
    </aside>
    <div class="overlay" id="overlay"></div>
    <a href="https://wa.me/5500000000000" target="_blank" class="whatsapp-float" aria-label="WhatsApp">💬</a>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
  <script src="js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const favs = getFavorites();
            const grid = document.getElementById('favGrid');
            const count = document.getElementById('favCount');
            count.textContent = `(${favs.length})`;
            if (favs.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state__icon">♡</div><h3 class="empty-state__title">Nenhum favorito ainda</h3><p class="empty-state__text">Adicione produtos aos favoritos clicando no ♡</p><a href="loja.html" class="btn btn--primary">Explorar Produtos</a></div>';
                return;
            }
            const products = NeedwayData.products.filter(p => favs.includes(p.id));
            grid.innerHTML = products.map(renderProductCard).join('');
            initSearch();
        });
    </script>
</body>

</html>
